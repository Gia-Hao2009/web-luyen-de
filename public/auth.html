<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Đăng nhập — Luyện Đề</title>
<link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">Luyện<span>Đề</span></div>
  <nav id="nav-links"></nav>
</header>

<main class="container" style="max-width:420px;">
  <div class="tabs">
    <button id="tab-login" class="active">Đăng nhập</button>
    <button id="tab-register">Đăng ký</button>
  </div>

  <div class="card" id="form-login">
    <h2>Đăng nhập</h2>
    <label>Username</label>
    <input type="text" id="login-username" />
    <label>Password</label>
    <input type="password" id="login-password" />
    <div class="error-msg" id="login-error"></div>
    <button style="margin-top:14px;" onclick="doLogin()">Đăng nhập</button>
  </div>

  <div class="card" id="form-register" style="display:none;">
    <h2>Đăng ký tài khoản</h2>
    <label>Username</label>
    <input type="text" id="reg-username" />
    <label>Password (tối thiểu 4 ký tự)</label>
    <input type="password" id="reg-password" />
    <div class="error-msg" id="reg-error"></div>
    <button style="margin-top:14px;" onclick="doRegister()">Đăng ký</button>
  </div>
</main>

<footer class="site-footer">
  <span>Luyện đề IELTS &amp; THPT</span>
  <a href="/admin/login.html" class="admin-link">Quản trị viên</a>
</footer>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/nav.js"></script>
<script>
document.getElementById("tab-login").addEventListener("click", () => switchTab("login"));
document.getElementById("tab-register").addEventListener("click", () => switchTab("register"));

function switchTab(which) {
  document.getElementById("tab-login").classList.toggle("active", which === "login");
  document.getElementById("tab-register").classList.toggle("active", which === "register");
  document.getElementById("form-login").style.display = which === "login" ? "block" : "none";
  document.getElementById("form-register").style.display = which === "register" ? "block" : "none";
}

async function doLogin() {
  const username = document.getElementById("login-username").value.trim();
  const password = document.getElementById("login-password").value;
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";
  try {
    const data = await Api.call("login", { method: "POST", body: { username, password } });
    Api.setStudentSession(data.token, data.username);
    location.href = "/index.html";
  } catch (err) {
    errEl.textContent = err.message;
  }
}

async function doRegister() {
  const username = document.getElementById("reg-username").value.trim();
  const password = document.getElementById("reg-password").value;
  const errEl = document.getElementById("reg-error");
  errEl.textContent = "";
  try {
    const data = await Api.call("register", { method: "POST", body: { username, password } });
    Api.setStudentSession(data.token, data.username);
    location.href = "/index.html";
  } catch (err) {
    errEl.textContent = err.message;
  }
}
</script>
</body>
</html>
